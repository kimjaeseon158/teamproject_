services:
  db:
    image: postgres:16-alpine
    container_name: teamproject-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teamproject}
      POSTGRES_USER: ${POSTGRES_USER:-teamproject}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Back/myproject
    container_name: teamproject-backend
    restart: unless-stopped
    env_file:
      - ./Back/myproject/.env
    environment:
      DB_NAME: ${POSTGRES_DB:-teamproject}
      DB_USER: ${POSTGRES_USER:-teamproject}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./front
      args:
        REACT_APP_WS_BASE_URL: ${REACT_APP_WS_BASE_URL:-/ws}
    container_name: teamproject-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
